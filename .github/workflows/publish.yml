name: Publish

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [vault-updated]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      # On vault-updated dispatch (or manual run), pull Blog/ from the vault
      # repo and commit any new/changed posts before building.
      - name: Check out vault Blog folder
        if: github.event_name != 'push'
        uses: actions/checkout@v4
        with:
          repository: balheru/claude-collab
          token: ${{ secrets.VAULT_SYNC_TOKEN }}
          path: _vault
          sparse-checkout: Blog

      - name: Commit synced posts
        if: github.event_name != 'push'
        run: |
          mkdir -p src/content/posts
          # Find and copy all markdown files recursively from _vault/Blog subdirectories
          find _vault/Blog -type f -name "*.md" -exec cp {} src/content/posts/ \;
          rm -rf _vault
          git config user.name "vault-sync"
          git config user.email "actions@github.com"
          git add src/content/posts
          if ! git diff --cached --quiet; then
            git commit -m "Sync posts from vault"
            git push
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build (Astro + Pagefind)
        run: npm run build

      - name: Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT

      - name: Cache Playwright binaries
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium and system dependencies
        run: npx playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright system dependencies (on cache hit)
        run: npx playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: E2E tests
        run: npm run test:e2e

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
